name: Build Waypoint desktop apps

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows installer
            platform: windows-latest
            rust_targets: ""
            args: --bundles nsis
          - label: Linux AppImage
            platform: ubuntu-22.04
            rust_targets: ""
            args: --bundles appimage
          - label: macOS Apple Silicon
            platform: macos-latest
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - label: macOS Intel
            platform: macos-latest
            rust_targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Download the Waypoint source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux desktop libraries
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Waypoint dependencies
        run: pnpm install --frozen-lockfile

      - name: Create application icons
        run: pnpm tauri icon public/favicon.svg

      - name: Check the Waypoint interface
        run: pnpm typecheck

      - name: Build the desktop installer
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: Waypoint-[platform]-[arch]-[bundle]
